version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: project6-backend
    environment:
      - NODE_ENV=production
      - PORT=5000
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    restart: unless-stopped
    networks:
      - project6-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000
        - NEXT_PUBLIC_TINYMCE=
    container_name: project6-frontend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - project6-network

networks:
  project6-network:
    driver: bridge
