# docker-compose.dev.yml - Development mode with hot reload
# Usage: docker compose -f docker-compose.dev.yml up --build

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: project6-backend-dev
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
    volumes:
      # Mount source code for hot reload
      - ./backend:/app
      # Keep node_modules from inside container
      - /app/node_modules
    restart: unless-stopped
    networks:
      - project6-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: project6-frontend-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_PUBLIC_TINYMCE=
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      # Mount source code for hot reload
      - ./frontend:/app
      # Keep node_modules and .next from inside container
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - project6-network

networks:
  project6-network:
    driver: bridge
